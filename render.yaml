services:
  - type: web
    name: fridgechef
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fridgechef-db
          property: connectionString

databases:
  - name: fridgechef-db
    plan: free
    region: singapore
    databaseName: fridgechef
    user: fridgechef
